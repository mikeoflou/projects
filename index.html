<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <style>
        body { background-color: lightgreen; font-size: 14px; font-weight: bold; margin: 0; font-family: sans-serif; }
        #sidebar { height: 100%; width: 0; position: fixed; z-index: 1000; top: 0; left: 0; background-color: #111; overflow-x: hidden; transition: 0.5s; padding-top: 60px; }
        #sidebar a { padding: 15px 32px; text-decoration: none; font-size: 25px; color: lightgreen; display: block; }
        #calendar { height: 600px; max-width: 900px; margin: 40px auto; background: white !important; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .fc .fc-toolbar-title { color: #000000 !important; }
        .fc .fc-button-primary { background-color: #006400 !important; border-color: #006400 !important; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
</head>
<body>

    <button id="toggleNav" style="font-size: 20px; cursor: pointer; margin: 10px; z-index: 1001; position: relative;">☰ Menu</button>
    
    <div id="sidebar">
        <a href="https://facebook.com">Facebook</a>
        <a href="https://mail.google.com/mail/u/0/?tab=rm&ogbl#inbox">Gmail</a>
        <a href="https://biblegateway.com/">Biblegateway</a>                
        <a href="https://www.ehbcjeff.com/">EBHC Jeff</a>
        <a href="https://www.ehbcnewsletterjeff.org">EHBC Newsletter</a>
        <a href="https://www.firstharrison.com/">First Harrison</a>
        <a href="https://onlinebanking.huntington.com/rol/Auth/login.aspx">Huntington Bank</a>
        <a href="https://investor.vanguard.com/">Vanguard</a>
        <a href="https://my.ivytech.edu/myivy">IvyLearn(Outlook)</a>
        <a href="https://ivylearn.ivytech.edu/courses/1405942/modules">MyIvy</a>
        <a href="https://www.va.gov/louisville-health-care/">VA</a>
    </div>

    <div id="calendar"></div>

    <div id="eventModal" style="display:none; position:fixed; z-index:2000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
        <div style="background:white; margin:10% auto; padding:20px; width:400px; border-radius:8px;">
            <h3 id="modalTitle">Appointment Details</h3>
            
            <div style="margin-bottom:10px;">
                <label>Add Event:</label>
                <input type="text" id="eventTitle" placeholder="Event Name" style="width:100%;">
            </div>
            
            <div style="margin-bottom:10px;">
                <label>Description:</label>
                <input type="text" id="eventDesc" placeholder="Details" style="width:100%;">
            </div>
            
            <div style="margin-bottom:10px;">
                <label>Time:</label>
                <div style="display: flex; gap: 5px;">
                    <select id="hourSelect" style="width:50%;"></select>
                    <select id="ampmSelect" style="width:50%;">
                        <option value="AM">AM</option>
                        <option value="PM">PM</option>
                    </select>
                </div>
            </div>
            
            <div style="display:flex; gap:10px;">
                <button id="saveBtn" style="flex:1; background:green; color:white; border:none; padding:10px; cursor:pointer;">Save</button>
                <button id="deleteBtn" style="flex:1; background:red; color:white; border:none; padding:10px; cursor:pointer;">Delete</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            let editingEvent = null;
            const modal = document.getElementById('eventModal');
            
            // Populate hour dropdown
            const hourSelect = document.getElementById('hourSelect');
            for (let i = 1; i <= 12; i++) {
                hourSelect.innerHTML += `<option value="${i}">${i}:00</option>`;
                hourSelect.innerHTML += `<option value="${i}.5">${i}:30</option>`;
            }

            document.getElementById('toggleNav').addEventListener('click', function() {
                const sidebar = document.getElementById('sidebar');
                sidebar.style.width = (sidebar.style.width === "250px") ? "0" : "250px";
            });

            const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth',
                selectable: true,
                events: JSON.parse(localStorage.getItem('myCalendarEvents') || '[]'),
                
                dateClick: function(info) {
                    editingEvent = null;
                    document.getElementById('eventTitle').value = '';
                    document.getElementById('eventDesc').value = '';
                    window.selectedDate = info.dateStr;
                    modal.style.display = 'block';
                },
                
                eventClick: function(info) {
                    editingEvent = info.event;
                    document.getElementById('eventTitle').value = info.event.title;
                    document.getElementById('eventDesc').value = info.event.extendedProps.description || '';
                    window.selectedDate = info.event.startStr.split('T')[0];
                    modal.style.display = 'block';
                }
            });
            calendar.render();

            document.getElementById('saveBtn').addEventListener('click', () => {
                let title = document.getElementById('eventTitle').value;
                let desc = document.getElementById('eventDesc').value;
                let hour = parseFloat(document.getElementById('hourSelect').value);
                let ampm = document.getElementById('ampmSelect').value;
                
                let h24 = ampm === 'PM' && hour !== 12 ? hour + 12 : (ampm === 'AM' && hour === 12 ? 0 : hour);
                let timeStr = h24.toString().padStart(2, '0') + (hour % 1 === 0 ? ':00' : ':30');

                let events = JSON.parse(localStorage.getItem('myCalendarEvents') || '[]');
                if (editingEvent) {
                    editingEvent.setProp('title', title);
                    editingEvent.setExtendedProp('description', desc);
                    editingEvent.setStart(window.selectedDate + 'T' + timeStr);
                    events = events.map(e => e.id === editingEvent.id ? { ...e, title, extendedProps: { description: desc }, start: window.selectedDate + 'T' + timeStr } : e);
                } else {
                    let newEvent = { id: Date.now().toString(), title, extendedProps: { description: desc }, start: window.selectedDate + 'T' + timeStr };
                    calendar.addEvent(newEvent);
                    events.push(newEvent);
                }
                localStorage.setItem('myCalendarEvents', JSON.stringify(events));
                modal.style.display = 'none';
            });

            // Replace your current 'events:' line with this:
events: (function() {
    let saved = localStorage.getItem('myCalendarEvents');
    console.log("Loading from storage:", saved); // This will tell us if it's really empty
    return saved ? JSON.parse(saved) : [];
})(),

            document.getElementById('deleteBtn').addEventListener('click', () => {
                if (editingEvent && confirm('Are you sure?')) {
                    editingEvent.remove();
                    let events = JSON.parse(localStorage.getItem('myCalendarEvents') || '[]');
                    events = events.filter(e => e.id !== editingEvent.id);
                    localStorage.setItem('myCalendarEvents', JSON.stringify(events));
                    modal.style.display = 'none';
                }
            });
        })();
    </script>
</body>
</html>
