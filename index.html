<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Page</title>
    <style>
        body {
            background-color: lightgreen;
            font-size: 14px;
            font-weight: bold;
            margin: 0;
            font-family: sans-serif;
        }
        h1 { text-align: center; }

        /* Sidebar Styles */
        #sidebar {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 100;
            top: 0;
            left: 0;
            background-color: #111;
            overflow-x: hidden;
            transition: 0.5s;
            padding-top: 60px;
        }
        #sidebar a {
            padding: 15px 32px;
            text-decoration: none;
            font-size: 25px;
            color: white;
            display: block;
        }
        #sidebar a:hover { 
            color: green; 
        }
        #sidebar a:visited{
            color:green;
        }

        #calendar {
            
            height: 600px; /* Add this line! */
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
.fc-header-toolbar {
    display: flex !important;
    justify-content: space-between !important;
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
</head>
<body>

    <button id="toggleNav" style="font-size: 20px; cursor: pointer; margin: 10px;">☰ Menu</button>

    <div id="sidebar" >
        <a href="https://mail.google.com/mail/u/0/?tab=rm&ogbl#inbox">Gmail</a>        <a href="https://biblegateway.com/">Biblegateway</a>                
        <a href="https://www.ehbcjeff.com/">EBHC Jeff</a>
        <a href="https://www.ehbcnewsletterjeff.org">EHBC Newsletter</a>"
        <a href="https://www.firstharrison.com/">First Harrison</a>
        <a href="https://onlinebanking.huntington.com/rol/Auth/login.aspx">huntington Bank</a>
        <a href="https://investor.vanguard.com/">Vanguard</a>
        <a href="https://my.ivytech.edu/myivy">IvyLearn(Outlook)</a>
        <a href="https://ivylearn.ivytech.edu/courses/1405942/modules">MyIvy</a>
        <a href="https://www.va.gov/louisville-health-care/">VA</a>
    </div>

    <div id="calendar" style="max-width: 900px; margin: 40px auto; background: white; padding: 20px;"></div>
<script>
  const menuButton = document.getElementById('toggleNav');
  const sidebar = document.getElementById('sidebar');

  menuButton.addEventListener('click', () => {
    if (sidebar.style.width === "250px") {
      sidebar.style.width = "0";
    } else {
      sidebar.style.width = "250px";
    }
  });
</script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    var calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth'
      },
      editable: true, // Allows you to drag/drop events
      selectable: true // Allows you to click to add events
    });
    calendar.render();
  });
</script>
</body>
</html>
