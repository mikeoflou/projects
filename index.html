<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <style>
        body { background-color: lightgreen; font-size: 14px; font-weight: bold; margin: 0; font-family: sans-serif; }
        #sidebar { height: 100%; width: 0; position: fixed; z-index: 1000; top: 0; left: 0; background-color: #111; overflow-x: hidden; transition: 0.5s; padding-top: 60px; }
        #sidebar a { padding: 15px 32px; text-decoration: none; font-size: 25px; color: lightgreen; display: block; }
        #calendar { height: 600px; max-width: 900px; margin: 40px auto; background: white !important; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .fc .fc-toolbar-title { color: #000000 !important; }
        .fc .fc-button-primary { background-color: #006400 !important; border-color: #006400 !important; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <button id="toggleNav" style="font-size: 20px; cursor: pointer; margin: 10px; z-index: 1001; position: relative;">☰ Menu</button>
    
    <div id="sidebar">
        <a href="https://facebook.com">Facebook</a>
        <a href="https://mail.google.com/mail/u/0/?tab=rm&ogbl#inbox">Gmail</a>
        <a href="https://biblegateway.com/">Biblegateway</a>                
        <a href="https://www.ehbcjeff.com/">EBHC Jeff</a>
        <a href="https://www.ehbcnewsletterjeff.org">EHBC Newsletter</a>
        <a href="https://www.firstharrison.com/">First Harrison</a>
        <a href="https://onlinebanking.huntington.com/rol/Auth/login.aspx">Huntington Bank</a>
        <a href="https://investor.vanguard.com/">Vanguard</a>
        <a href="https://my.ivytech.edu/myivy">IvyLearn(Outlook)</a>
        <a href="https://ivylearn.ivytech.edu/courses/1405942/modules">MyIvy</a>
        <a href="https://www.va.gov/louisville-health-care/">VA</a>
    </div>

    <div id="calendar"></div>

    <div id="eventModal" style="display:none; position:fixed; z-index:2000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
    <div style="background:white; margin:10% auto; padding:20px; width:400px; border-radius:8px;">
        <h3>Appointment Details</h3>
        
        <label>Title:</label>
        <input type="text" id="eventTitle" style="width:100%; margin-bottom:10px;">
        
        <label>Description:</label>
        <input type="text" id="eventDesc" style="width:100%; margin-bottom:10px;">
        
        <label>Time (HH:MM):</label>
        <input type="time" id="eventTime" style="width:100%; margin-bottom:10px;">
        
        <label>
            <input type="checkbox" id="eventAmPm"> PM (Uncheck for AM)
        </label>
        
        <br><br>
        <button id="saveBtn" style="width:100%; background:green; color:white; border:none; padding:10px; cursor:pointer;">Save</button>
        <button id="deleteBtn" style="width:100%; background:red; color:white; border:none; padding:10px; cursor:pointer; margin-top:5px;">Delete</button>
    </div>
</div>

<script>
    // 1. Initialize Supabase
    const mySupabase = supabase.createClient(
        'https://saufbyduwfoipmcztzde.supabase.co', 
        'sb_publishable_IIuSQYyD5K-dNMokGY2xZg_nCrGNus9'
    );

    document.addEventListener('DOMContentLoaded', async function() {
        const modal = document.getElementById('eventModal');
        const toggleNav = document.getElementById('toggleNav');
        const calendarEl = document.getElementById('calendar');

        // 2. Sidebar toggle
        toggleNav.addEventListener('click', () => {
            const sidebar = document.getElementById('sidebar');
            sidebar.style.width = (sidebar.style.width === "250px") ? "0" : "250px";
        });

        // Close sidebar when clicking outside
        document.addEventListener('click', (event) => {
            const sidebar = document.getElementById('sidebar');
            if (sidebar.style.width === "250px" && !sidebar.contains(event.target) && event.target !== toggleNav) {
                sidebar.style.width = "0";
            }
        });

        // 3. Load Events from Supabase
        let { data: events, error } = await mySupabase.from('events').select('*');
        if (error) console.error("Error loading events:", error);

        // 4. Initialize FullCalendar
        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            selectable: true,
            events: events ? events.map(e => ({
                id: e.id, 
                title: e.title, 
                start: e.start_date,
                description: e.Description,
                time: e.time
            })) : [],
            
            dateClick: function(info) {
                window.selectedEventId = null;
                document.getElementById('eventTitle').value = '';
                document.getElementById('eventDesc').value = '';
                window.selectedDate = info.dateStr;
                modal.style.display = 'block';
            },

            eventClick: function(info) {
                window.selectedEventId = info.event.id;
                document.getElementById('eventTitle').value = info.event.title;
                document.getElementById('eventDesc').value = info.event.extendedProps.description || '';
                modal.style.display = 'block';
            }
        });
        calendar.render();

        // 5. Save Button
        document.getElementById('saveBtn').addEventListener('click', async () => {
            const titleVal = document.getElementById('eventTitle').value;
            const descVal = document.getElementById('eventDesc').value;
            const timeVal = document.getElementById('eventTime').value;
            const amPmVal = document.getElementById('eventAmPm').checked;

            const { data, error } = await mySupabase.from('events').insert([{ 
                title: titleVal, 
                start_date: window.selectedDate,
                Description: descVal,
                time: timeVal ? timeVal + ":00" : "12:00:00",
                am_pm: amPmVal
            }]);
            
            if (!error) {
                location.reload();
            } else {
                alert("Error saving: " + error.message);
            }
        });

        // 6. Delete Button
        document.getElementById('deleteBtn').addEventListener('click', async () => {
            if (!window.selectedEventId) {
                alert("No event selected.");
                return;
            }
            const { error } = await mySupabase.from('events').delete().eq('id', window.selectedEventId);
            if (!error) {
                location.reload();
            } else {
                alert("Error deleting: " + error.message);
            }
        });
    });
</script>
</body>
</html>
