<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: lightgreen; font-size: 14px; font-weight: bold; margin: 0; font-family: sans-serif; }
        
        #sidebar { height: 100%; width: 0; position: fixed; z-index: 1000; top: 0; left: 0; background-color: #111; overflow-x: hidden; transition: 0.5s; padding-top: 60px; }
        #sidebar a { padding: 15px 32px; text-decoration: none; font-size: 25px; color: lightgreen; display: block; }
        
        .hidden { display: none; }
        #calendarContainer {
            position: absolute;
            top: 60px;
            left: 10px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            z-index: 900;
        }
        #calendar { height: 500px; width: 800px; background: beige !important; }

        #headerBar { display: flex; align-items: center; gap: 10px; padding: 10px; }
        #calendarToggle, #toggleNav { font-size: 20px; cursor: pointer; padding: 5px 10px; z-index: 1001; }

        .fc .fc-toolbar-title { color: #000000 !important; }
        .fc .fc-button-primary { background-color: #006400 !important; border-color: #006400 !important; }
        #eventModal { z-index: 9999 !important; }
        .fc-event-title { color: black !important; font-weight: bold !important; }
        .fc .fc-day-today {

          /* Only style the cell that is today */
  
         .fc .fc-day-today {
    background-color: lightgreen !important;
}

/* Also ensure the background isn't being overridden by an internal calendar theme */
.fc-theme-standard .fc-day-today {
    background-color: lightgreen !important;
}
}
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

   <div id="headerBar">
        <button id="calendarToggle" style="font-size: 20px; cursor: pointer; padding: 5px 10px; z-index: 1001;">&#128197;</button>
        <button id="toggleNav">☰ Menu</button>
        <div id="weather-info" style="margin-left: 20px; font-size: 16px; color: #333;">
            <span id="date-time"></span> | <span id="weather">Loading weather...</span>
        </div>
    </div>
    
    <div id="sidebar">
        <a href="https://facebook.com">Facebook</a>
        <a href="https://mail.google.com/mail/u/0/?tab=rm&ogbl#inbox">Gmail</a>
        <a href="https://biblegateway.com/">Biblegateway</a>                
        <a href="https://www.ehbcjeff.com/">EBHC Jeff</a>
        <a href="https://www.ehbcnewsletterjeff.org">EHBC Newsletter</a>
        <a href="https://www.firstharrison.com/">First Harrison</a>
        <a href="https://onlinebanking.huntington.com/rol/Auth/login.aspx">Huntington Bank</a>
        <a href="https://investor.vanguard.com/">Vanguard</a>
        <a href="https://my.ivytech.edu/myivy">IvyLearn(Outlook)</a>
        <a href="https://ivylearn.ivytech.edu/courses/1405942/modules">MyIvy</a>
        <a href="https://www.va.gov/louisville-health-care/">VA</a>
    </div>

    <div id="calendarContainer" class="hidden">
        <div id="calendar"></div>
    </div>

    <div id="eventModal" style="display:none; position:fixed; z-index:9999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
        <div style="background:white; margin:10% auto; padding:20px; width:400px; border-radius:8px;">
            <h3>Appointment Details</h3>
            <label>Title:</label>
            <input type="text" id="eventTitle" style="width:100%; margin-bottom:10px;">
            <label>Description:</label>
            <input type="text" id="eventDesc" style="width:100%; margin-bottom:10px;">
            <label>Time (HH:MM):</label>
            <input type="time" id="eventTime" style="width:100%; margin-bottom:10px;">
            <label><input type="checkbox" id="eventAmPm"> PM (Uncheck for AM)</label>
            <br><br>
            <button id="saveBtn" style="width:100%; background:green; color:white; border:none; padding:10px; cursor:pointer;">Save</button>
            <button id="deleteBtn" style="width:100%; background:red; color:white; border:none; padding:10px; cursor:pointer; margin-top:5px;">Delete</button>
        </div>
    </div>

<script>
    const mySupabase = supabase.createClient(
        'https://saufbyduwfoipmcztzde.supabase.co', 
        'sb_publishable_IIuSQYyD5K-dNMokGY2xZg_nCrGNus9'
    );

    document.addEventListener('DOMContentLoaded', async function() {
        const modal = document.getElementById('eventModal');
        const calendarEl = document.getElementById('calendar');
        const calCont = document.getElementById('calendarContainer');
        const sidebar = document.getElementById('sidebar');
        
        // Weather & Date setup
        const dateTimeEl = document.getElementById('date-time');
        const weatherEl = document.getElementById('weather');
        const API_KEY = 'd1e6fb784b1050cf34f0c8f0b552db49'; // REPLACE WITH YOUR KEY
        const CITY = 'Jeffersonville';

        setInterval(() => {
            dateTimeEl.textContent = new Date().toLocaleString();
        }, 1000);

        async function fetchWeather() {
            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CITY}&units=imperial&appid=${API_KEY}`);
                const data = await response.json();
                weatherEl.textContent = `${Math.round(data.main.temp)}°F, ${data.weather[0].main}`;
            } catch (error) {
                weatherEl.textContent = "Weather unavailable";
            }
        }
        fetchWeather();
        setInterval(fetchWeather, 600000);

        // Toggle Nav
        document.getElementById('toggleNav').addEventListener('click', (e) => {
            e.stopPropagation();
            sidebar.style.width = (sidebar.style.width === "250px") ? "0" : "250px";
        });

        // Toggle Calendar
        document.getElementById('calendarToggle').addEventListener('click', (e) => {
            e.stopPropagation();
            calCont.classList.toggle('hidden');
            if (!calCont.classList.contains('hidden')) {
                calendar.render(); 
            }
        });

        document.addEventListener('click', (event) => {
            if (sidebar.style.width === "250px" && !sidebar.contains(event.target) && event.target.id !== 'toggleNav') {
                sidebar.style.width = "0";
            }
            if (!calCont.classList.contains('hidden') && !calCont.contains(event.target) && event.target.id !== 'calendarToggle') {
                calCont.classList.add('hidden');
            }
        });

        window.onclick = (event) => { if (event.target == modal) modal.style.display = "none"; };

        let { data: events } = await mySupabase.from('events').select('*');

        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            selectable: true,
            displayEventTime: false,
            events: events ? events.map(e => ({
                id: e.id, 
                title: (e.time ? e.time.substring(0, 5) + " " : "") + (e.title || ""),
                start: e.start_date,
                extendedProps: { description: e.Description, time: e.time }
            })) : [],
            
            dateClick: (info) => {
                window.selectedEventId = null;
                window.selectedDate = info.dateStr;
                modal.style.display = 'block';
            },

            eventClick: (info) => {
                window.selectedEventId = info.event.id;
                document.getElementById('eventTitle').value = info.event.title.replace(/^\d{2}:\d{2}\s/, '');
                document.getElementById('eventDesc').value = info.event.extendedProps.description || '';
                if (info.event.extendedProps.time) {
                    document.getElementById('eventTime').value = info.event.extendedProps.time.substring(0, 5);
                }
                modal.style.display = 'block';
            }
        });
        calendar.render();

        document.getElementById('saveBtn').addEventListener('click', async () => {
            const payload = {
                title: document.getElementById('eventTitle').value,
                Description: document.getElementById('eventDesc').value,
                time: document.getElementById('eventTime').value + ":00",
                am_pm: document.getElementById('eventAmPm').checked
            };

            if (window.selectedEventId) {
                await mySupabase.from('events').update(payload).eq('id', window.selectedEventId);
            } else {
                await mySupabase.from('events').insert([{ ...payload, start_date: window.selectedDate }]);
            }
            location.reload();
        });

        document.getElementById('deleteBtn').addEventListener('click', async () => {
            if (window.selectedEventId) {
                await mySupabase.from('events').delete().eq('id', window.selectedEventId);
                location.reload();
            }
        });
    });
</script>
</body>
</html>
