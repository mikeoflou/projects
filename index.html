    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet"> 
    <link rel="stylesheet" href="/myStyle.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <script src="myScripts.js"></script>
    </script>
</head>
<body>

  <div id="headerBar">
    <button id="toggleNav">☰ Menu</button>
    <button id="calendarToggle">📅 Calendar</button>
    
    <form id="geminiSearchForm" style="display:inline;">
      <input type="text" id="searchQuery" placeholder="Ask Gemini..." required>
      <button type="submit">Search</button>
    </form>  

    <div id="weather-info" style="margin-left: 20px; font-size: 16px; color: #333;">
        <span id="date-time"></span> | <span id="weather">Loading weather...</span>
    </div>
  </div>
    
  <div id="sidebar">
      <a href="https://facebook.com">Facebook</a>
      <a href="https://mail.google.com/mail/u/0/?tab=rm&ogbl#inbox">Gmail</a>
      <a href="https://biblegateway.com/">Biblegateway</a>                
      <a href="https://www.ehbcjeff.com/">EBHC Jeff</a>
      <a href="https://www.ehbcnewsletterjeff.org">EHBC Newsletter</a>
      <a href="https://www.firstharrison.com/">First Harrison</a>
      <a href="https://onlinebanking.huntington.com/rol/Auth/login.aspx">Huntington Bank</a>
      <a href="https://investor.vanguard.com/">Vanguard</a>
      <a href="https://my.ivytech.edu/myivy">IvyLearn(Outlook)</a>
      <a href="https://ivylearn.ivytech.edu/courses/1405942/modules">MyIvy</a>
      <a href="https://www.va.gov/louisville-health-care/">VA</a>
  </div>

  <div id="main-content">
      <div class="shortcuts-grid">
          <a class="shortcut-tile" href="https://facebook.com" target="_blank">
              <div class="tile-icon"><img src="https://www.google.com/s2/favicons?sz=64&domain=facebook.com" alt="Facebook"></div>
              <div class="tile-label">Facebook</div>
          </a>
          <a class="shortcut-tile" href="https://mail.google.com/mail/u/0/?tab=rm&ogbl#inbox" target="_blank">
              <div class="tile-icon"><img src="https://www.google.com/s2/favicons?sz=64&domain=mail.google.com" alt="Gmail"></div>
              <div class="tile-label">Gmail</div>
          </a>
          <a class="shortcut-tile" href="https://biblegateway.com/" target="_blank">
              <div class="tile-icon"><img src="https://www.google.com/s2/favicons?sz=64&domain=biblegateway.com" alt="Biblegateway"></div>
              <div class="tile-label">Biblegateway</div>
          </a>                
          <a class="shortcut-tile" href="https://www.ehbcjeff.com/" target="_blank">
              <div class="tile-icon"><img src="https://www.google.com/s2/favicons?sz=64&domain=ehbcjeff.com" alt="EHBC Jeff"></div>
              <div class="tile-label">EHBC Jeff</div>
          </a>
          <a class="shortcut-tile" href="https://www.ehbcnewsletterjeff.org" target="_blank">
              <div class="tile-icon"><img src="https://www.google.com/s2/favicons?sz=64&domain=ehbcnewsletterjeff.org" alt="EHBC Newsletter"></div>
              <div class="tile-label">EHBC Newsletter</div>
          </a>
          <a class="shortcut-tile" href="https://www.firstharrison.com/" target="_blank">
              <div class="tile-icon"><img src="https://www.google.com/s2/favicons?sz=64&domain=firstharrison.com" alt="First Harrison"></div>
              <div class="tile-label">First Harrison</div>
          </a>
          <a class="shortcut-tile" href="https://onlinebanking.huntington.com/rol/Auth/login.aspx" target="_blank">
              <div class="tile-icon"><img src="https://www.google.com/s2/favicons?sz=64&domain=huntington.com" alt="Huntington"></div>
              <div class="tile-label">Huntington Bank</div>
          </a>
          <a class="shortcut-tile" href="https://investor.vanguard.com/" target="_blank">
              <div class="tile-icon"><img src="https://www.google.com/s2/favicons?sz=64&domain=vanguard.com" alt="Vanguard"></div>
              <div class="tile-label">Vanguard</div>
          </a>
          <a class="shortcut-tile" href="https://my.ivytech.edu/myivy" target="_blank">
              <div class="tile-icon"><img src="https://www.google.com/s2/favicons?sz=64&domain=ivytech.edu" alt="IvyTech"></div>
              <div class="tile-label">MyIvy</div>
          </a>
          <a class="shortcut-tile" href="https://www.va.gov/louisville-health-care/" target="_blank">
              <div class="tile-icon"><img src="https://www.google.com/s2/favicons?sz=64&domain=va.gov" alt="VA"></div>
              <div class="tile-label">VA</div>
          </a>
      </div>
  </div>

  <div id="calendarContainer" class="hidden">
      <div id="calendar"></div>
  </div>

  <div id="eventModal" style="display:none; position:fixed; z-index:9999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
      <div style="background:white; margin:10% auto; padding:20px; width:400px; border-radius:8px;">
          <h3>Appointment Details</h3>
          <label>Title:</label>
          <input type="text" id="eventTitle" style="width:100%; margin-bottom:10px;">
          <label>Description:</label>
          <input type="text" id="eventDesc" style="width:100%; margin-bottom:10px;">
          <label>Time (HH:MM):</label>
          <input type="time" id="eventTime" style="width:100%; margin-bottom:10px;">
          <label><input type="checkbox" id="eventAmPm"> PM (Uncheck for AM)</label>
          <br><br>
          <button id="saveBtn" style="width:100%; background:green; color:white; border:none; padding:10px; cursor:pointer;">Save</button>
          <button id="deleteBtn" style="width:100%; background:red; color:white; border:none; padding:10px; cursor:pointer; margin-top:5px;">Delete</button>
      </div>
  </div>
</body>
</html>
