<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Page</title>
    <style>
    /* Force title to black */
    .fc .fc-toolbar-title {
        color: #000000 !important;
    }

    /* Force buttons to dark green */
    .fc .fc-button-primary {
        background-color: #006400 !important; /* Dark Green */
        border-color: #006400 !important;
    }
    
    /* Hover state for buttons */
    .fc .fc-button-primary:hover {
        background-color: #004d00 !important;
    }

    /* Force Today's highlight */
    .fc .fc-day-today {
        background-color: #fffacd !important;
    }
    .selected-date-highlight {
        background-color: green !important;
        color: white !important;
    }
</style>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
</head>
<body>

    <button id="toggleNav" style="font-size: 20px; cursor: pointer; margin: 10px;">☰ Menu</button>

    <div id="sidebar" >
        <a href="https://mail.google.com/mail/u/0/?tab=rm&ogbl#inbox">Gmail</a>        <a href="https://biblegateway.com/">Biblegateway</a>                
        <a href="https://www.ehbcjeff.com/">EBHC Jeff</a>
        <a href="https://www.ehbcnewsletterjeff.org">EHBC Newsletter</a>"
        <a href="https://www.firstharrison.com/">First Harrison</a>
        <a href="https://onlinebanking.huntington.com/rol/Auth/login.aspx">huntington Bank</a>
        <a href="https://investor.vanguard.com/">Vanguard</a>
        <a href="https://my.ivytech.edu/myivy">IvyLearn(Outlook)</a>
        <a href="https://ivylearn.ivytech.edu/courses/1405942/modules">MyIvy</a>
        <a href="https://www.va.gov/louisville-health-care/">VA</a>
    </div>

    <div id="calendar" style="max-width: 900px; margin: 40px auto; background: white; padding: 20px;"></div>
<script>
  const menuButton = document.getElementById('toggleNav');
  const sidebar = document.getElementById('sidebar');

  menuButton.addEventListener('click', () => {
    if (sidebar.style.width === "250px") {
      sidebar.style.width = "0";
    } else {
      sidebar.style.width = "250px";
    }
  });
</script>
<div id="calendar" style="max-width: 900px; margin: 40px auto; background: white;"></div>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    
    var calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      selectable: true, // Allows clicking a date
      
      // THIS handles the click action
      dateClick: function(info) {
        // 1. Remove highlight from any previously selected date
        var allCells = document.querySelectorAll('.fc-day');
        allCells.forEach(cell => cell.classList.remove('selected-date-highlight'));
        
        // 2. Add highlight to the clicked date
        info.dayEl.classList.add('selected-date-highlight');
        
        // 3. Ask to add an event
        var eventTitle = prompt('Enter event title for ' + info.dateStr + ':');
        if (eventTitle) {
          calendar.addEvent({
            title: eventTitle,
            start: info.dateStr,
            allDay: true
          });
        }
      }
    });
    calendar.render();
  });
</script>
</body>
</html>
